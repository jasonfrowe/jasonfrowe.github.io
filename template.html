<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { 
            --accent: #004d40; 
            --retro-bg: #0a0a0a;
            --retro-green: #00ff41; 
            --text-main: #333;
            --bg-main: #fdfdfd;
        }

        /* Smooth scrolling for the nav links */
        html { scroll-behavior: smooth; }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            line-height: 1.6; 
            color: var(--text-main); 
            max-width: 950px; 
            margin: auto; 
            padding: 0 20px 40px 20px; 
            background: var(--bg-main); 
        }

        /* Sticky Navigation Bar */
        nav {
            position: sticky;
            top: 0;
            background: rgba(253, 253, 253, 0.95);
            padding: 15px 0;
            border-bottom: 2px solid var(--accent);
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 20px;
            backdrop-filter: blur(5px);
        }
        nav a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        nav a:hover { background: #e0f2f1; }

        header { margin: 60px 0 50px 0; text-align: center; }
        h1 { font-size: 2.5em; margin-bottom: 5px; color: var(--accent); }
        h2 { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 50px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        /* Professional Repo Cards */
        .pro-card {
            background: white;
            padding: 20px;
            border-radius: 4px;
            border-left: 4px solid #1976d2; /* Science Blue */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-family: monospace;
            font-size: 1.1em;
        }
        .pro-card a { color: #1976d2; text-decoration: none; font-weight: bold; }
        .pro-card a:hover { text-decoration: underline; }

        /* Retro Cards */
        .game-card { 
            background: var(--retro-bg); 
            color: var(--retro-green); 
            padding: 25px; 
            border-radius: 4px; 
            font-family: 'Courier New', Courier, monospace; 
            border: 1px solid var(--retro-green);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.1);
            position: relative;
            overflow: hidden;
        }
        .game-card::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 2; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }
        .game-card h3 { color: white; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 5px; font-size: 1.2em; }
        .game-card a { color: var(--retro-green); font-weight: bold; text-decoration: none; border: 1px solid var(--retro-green); padding: 5px 10px; display: inline-block; margin-top: 10px; }
        .game-card a:hover { background: var(--retro-green); color: black; }

        .pub-card { background: white; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .year-label { font-weight: 900; font-size: 1.5em; margin: 40px 0 20px 0; display: block; color: #bbb; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <nav>
        <a href="#professional">Professional Software</a>
        <a href="#retro">Retro-Computing</a>
        <a href="#publications">Publications</a>
    </nav>

    <header>
        <h1>Jason Rowe</h1>
        <p><strong>Professor of Physics & Astronomy, Bishop's University</strong></p>
    </header>

    <section id="professional">
        <h2>Professional Software & Tools</h2>
        <div class="projects-grid">
            {{ pro_html | safe }}
        </div>
    </section>

    <section id="retro">
        <h2>Retro-Computing & Games</h2>
        <div class="projects-grid">
            {{ retro_html | safe }}
        </div>
    </section>

    <section id="publications">
        <h2>Academic Publications</h2>
        {{ pubs_html | safe }}
    </section>

    <footer style="margin-top: 100px; text-align: center; font-size: 0.8em; color: #999;">
        <p>&copy; 2026 Jason Rowe.</p>
    </footer>

</body>
</html>
